global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scraping itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Your Windows application (if you have metrics exposed)
  - job_name: 'my-app'
    static_configs:
      - targets: ['host.docker.internal:8000']  # Change 8000 to your app's port